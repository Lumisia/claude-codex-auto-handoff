  zh: "g 切换分类 · q/Esc 返回"
hint.settings:
  en: "↑/↓ select · space toggle · ←/→ change · q/Esc back"
  ko: "↑/↓ 선택 · Space 토글 · ←/→ 변경 · q/Esc 뒤로"
  ja: "↑/↓ 選択 · Space 切替 · ←/→ 変更 · q/Esc 戻る"
