  zh: "触发时: off(不做) · ask(确认) · auto(自动)"
setting.burn_enabled:
  en: "Also trigger based on how fast the budget is burning"
  ko: "예산 소진 속도 기준으로도 트리거"
  ja: "予算の消費速度でもトリガー"
