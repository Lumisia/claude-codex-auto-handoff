status.account_captured:
  en: "added account: %{label}"
  ko: "계정 추가됨: %{label}"
  ja: "アカウントを追加しました: %{label}"
  zh: "已添加账户: %{label}"
status.account_capture_failed:
  en: "add failed: %{err}"
  ko: "추가 실패: %{err}"
  ja: "追加に失敗: %{err}"
  zh: "添加失败: %{err}"
status.account_launched:
  en: "launched %{label} (this session)"
  ko: "%{label} 실행함 (이 세션)"
  ja: "%{label} を起動しました（このセッション）"
  zh: "已启动 %{label}（本次会话）"
status.account_login_window:
  en: "login opened in a new window — finish it there; the account appears when done"
  ko: "새 창에서 로그인 시작됨 — 거기서 완료하면 계정이 추가됩니다"
  ja: "新しいウィンドウでログイン開始 — そこで完了するとアカウントが追加されます"
  zh: "已在新窗口打开登录 — 在那里完成后账户将出现"
status.account_login_timeout:
  en: "login timed out (no credential captured)"
  ko: "로그인 시간 초과 (자격증명 못 받음)"
  ja: "ログインがタイムアウト（資格情報を取得できず）"
  zh: "登录超时（未捕获到凭据）"
status.account_launch_failed:
  en: "launch failed: %{err}"
  ko: "실행 실패: %{err}"
  ja: "起動に失敗: %{err}"
  zh: "启动失败: %{err}"
status.account_credits_ok:
  en: "reset credits: %{count}"
  ko: "초기화권: %{count}개"
  ja: "初期化券: %{count}枚"
  zh: "重置券: %{count} 个"
status.account_credits_failed:
  en: "reset credits unavailable: %{err}"
  ko: "초기화권 조회 실패: %{err}"
  ja: "初期化券の取得に失敗: %{err}"
  zh: "重置券获取失败: %{err}"

